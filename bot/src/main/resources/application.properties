spring.application.name=castlekeeper-bot
server.port=${BOT_PORT:8081}

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:castlekeeper_bot}

api.base-url=${API_BASE_URL:http://localhost:8080/api}

# Redis — set REDIS_HOST in .env or docker compose to enable
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:6379}

# Actuator + Prometheus metrics
management.endpoints.web.exposure.include=health,metrics,prometheus
management.prometheus.metrics.export.enabled=true
