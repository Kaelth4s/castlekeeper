name: Refresh Database Schema Docs

on:
  push:
    branches: [ main ]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Flyway CLI
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-linux-x64.tar.gz -o flyway.tar.gz
          tar -xzf flyway.tar.gz
          sudo ln -s $(pwd)/flyway-9.22.3/flyway /usr/local/bin/flyway

      - name: Install tbls
        run: |
          curl -sL https://github.com/k1LoW/tbls/releases/download/v1.77.0/tbls_v1.77.0_linux_amd64.tar.gz | tar xz
          sudo mv tbls /usr/local/bin/

      - name: Run Flyway migrations
        run: |
          flyway migrate \
            -url=jdbc:postgresql://localhost:5432/testdb \
            -user=test \
            -password=test \
            -locations=filesystem:server/src/main/resources/db/migration

      - name: Generate documentation
        env:
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
        run: tbls doc

      - name: Commit and push updated docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/database-schema/
          git diff --staged --quiet || (git commit -m "chore: update db schema docs [skip ci]" && git push)