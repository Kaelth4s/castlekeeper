services:
  postgres:
    image: postgres:16-alpine
    container_name: castlekeeper-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: castlekeeper-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: castlekeeper-server
    restart: unless-stopped
    ports:
      - "${SERV_PORT}:8080"
    environment:
      SERV_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: castlekeeper-bot
    restart: unless-stopped
    ports:
      - "${BOT_PORT:-8081}:8081"
    environment:
      BOT_PORT: 8081
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://server:8080/api
    depends_on:
      - server
      - redis

volumes:
  pgdata:
  redisdata:
